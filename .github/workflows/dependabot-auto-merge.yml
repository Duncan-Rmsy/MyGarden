# Auto-merges Dependabot SECURITY updates that are low-risk (patch/minor) once CI
# passes, so advisory fixes like the undici bump self-heal without manual review.
# Non-security version bumps and any major update are left for a human (and still
# go through the normal Dependabot weekly flow).
#
# Prerequisites (one-time repo settings — see PR description):
#   - Settings → General → Pull Requests → "Allow auto-merge" enabled.
#   - A branch protection rule on `main` requiring the `build` check, so auto-merge
#     waits for CI instead of merging immediately.
#
# Note: this job is a no-op for non-Dependabot PRs (see the actor gate below).
name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ghsa-id is only set for security updates; gate on patch/minor to never
      # auto-merge a major bump.
      - name: Enable auto-merge for low-risk security updates
        if: >-
          ${{ steps.metadata.outputs.ghsa-id != ''
          && (steps.metadata.outputs.update-type == 'version-update:semver-patch'
          || steps.metadata.outputs.update-type == 'version-update:semver-minor') }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
