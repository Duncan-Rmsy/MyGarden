name: CI

on:
  push:
    branches: ['main', 'claude/**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with domain coverage gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Security audit (no high/critical advisories)
        run: npm run audit:ci
