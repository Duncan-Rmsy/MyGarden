version: 2

# Keeps dependencies patched so known vulnerabilities don't sit in the tree, and
# keeps the CI actions current. Security advisories are raised as PRs automatically;
# routine version bumps are grouped to keep the noise down (see TESTING.md).
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: ['minor', 'patch']
      prod-minor-patch:
        dependency-type: production
        update-types: ['minor', 'patch']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
